<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Курс — EduQuest</title>
    <meta
      name="description"
      content="Страница курса платформы EduQuest: уроки, прогресс и интерактивный тест."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="header"></header>

    <main class="page">
      <div class="container">
        <div class="course">
          <div class="js-course">
            <p class="loader">Загрузка курса…</p>
          </div>

          <section class="section">
            <h2 class="section__title">Уроки</h2>
            <div class="lessons js-lessons"></div>
          </section>

          <section class="section">
            <h2 class="section__title">Интерактивный тест</h2>
            <div class="js-quiz">
              <p class="loader">Запустите итоговый урок-тест из списка выше.</p>
            </div>
          </section>
        </div>
      </div>
    </main>

    <footer class="footer">
      <div class="footer__inner">
        <span class="footer__logo">EduQuest</span>
        <span>Учебный проект, РТУ МИРЭА, 2026</span>
      </div>
    </footer>

    <script type="module" src="./course.js"></script>
  </body>
</html>
